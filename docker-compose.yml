services:
  web:
    build: .
    ports:
      - "2222:5000"
    env_file:
      - ./backend/.env
    environment:
      # Core
      - PORT=5000
      - DATABASE_URL=file:./prisma/dev.db

    volumes:
      # Persist the SQLite database across container restarts
      - sqldata:/app/backend/prisma

volumes:
  sqldata:
